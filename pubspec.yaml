name: opportunity_radar
description: Real-time local opportunity marketplace built with Flutter and Firebase.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.4
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4
  go_router: ^15.1.2
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
